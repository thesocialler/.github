name: Bug report
description: Something is broken or not working as expected
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. A short repro and environment details help us fix it faster.

  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: One or two sentences.
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Numbered steps, if you can.
      placeholder: |
        1. …
        2. …
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: App / package version (if known)
      placeholder: e.g. 1.4.2

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Android
        - iOS
        - Web
        - Other
    validations:
      required: true

  - type: textarea
    id: extra
    attributes:
      label: Logs, screenshots, or video (optional)
      description: Paste text, attach files in a follow-up comment if needed.
